services:
  chromadb:
    build: ./chromadb
    container_name: chromadb
    ports:
      - "8020:8000"
    volumes:
      - ./chromadb/chroma_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 20
      
  sandbox_elasticsearch:
    build: ./sandbox_es
    container_name: sandbox_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - ./sandbox_es/sandbox_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  dspy:
    build: ./team_a_dspy
    container_name: dspy
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      chromadb:
        condition: service_healthy
      sandbox_elasticsearch:
        condition: service_healthy
      mlflow:
        condition: service_started
    
  mlflow:
    build: ./team_b_mlflow
    container_name: mlflow
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./team_b_mlflow/tracking:/mlflow/tracking
      - ./team_b_mlflow/artifacts:/mlflow/artifacts
    command:
      [
        "mlflow",
        "server",
        "--host",
        "0.0.0.0",
        "--port",
        "5000",
        "--backend-store-uri",
        "sqlite:////mlflow/tracking/mlflow.db",
        "--default-artifact-root",
        "/mlflow/artifacts",
        "--allowed-hosts",
        "*"
      ]

networks:
  dspy-mlflow-network:
    driver: bridge

volumes:
  chroma_data:
    driver: local
  sandbox_es_data:
    driver: local
  